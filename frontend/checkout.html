<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WarForge – Checkout</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="brand">⚔️ WarForge</a>
    <div class="nav-links">
      <a href="index.html">Miniatures</a>
      <a href="cart.html">Cart <span class="cart-badge" id="cartCount">0</span></a>
      <span id="authLinks">
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
      </span>
      <span id="userLinks" style="display:none">
        <a href="orders.html">My Orders</a>
        <a href="#" id="adminLink" style="display:none">Admin</a>
        <a href="#" id="logoutBtn">Logout</a>
      </span>
    </div>
  </nav>

  <main class="container">
    <h2 class="page-title">Deploy Your Order</h2>
    <div class="checkout-grid">
      <!-- Order Summary -->
      <section class="order-summary card">
        <h3>Order Summary</h3>
        <div id="summaryItems"><p class="loading">Loading…</p></div>
        <div class="summary-total">
          <strong>Total: </strong><span id="summaryTotal">$0.00</span>
        </div>
      </section>

      <!-- Shipping Form -->
      <section class="card">
        <h3>Deployment Coordinates</h3>
        <form id="checkoutForm" class="form">
          <label>Full Name
            <input type="text" name="full_name" required placeholder="John Doe" />
          </label>
          <label>Address
            <input type="text" name="address" required placeholder="123 Main Street" />
          </label>
          <label>City
            <input type="text" name="city" required placeholder="New York" />
          </label>
          <label>Postal Code
            <input type="text" name="postal_code" required placeholder="10001" />
          </label>
          <label>Country
            <input type="text" name="country" required placeholder="United States" />
          </label>
          <div id="checkoutError" class="error-msg"></div>
          <button type="submit" class="btn btn-primary btn-block">Confirm Requisition</button>
        </form>
      </section>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 WarForge. In the Emperor's name.</p>
  </footer>

  <script src="js/auth-common.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
